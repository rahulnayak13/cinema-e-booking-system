spring.application.name=cinema

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/cinema
spring.datasource.username=cinema_user
spring.datasource.password=cinema_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always

# Email Configuration - Brevo SMTP
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM_ADDRESS:swegroup17.100@gmail.com}
app.frontend.base-url=http://localhost:5173

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true